<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Task Management</title>
</head>

<body>
    <div class="box">

        <div class="main">
            <div>
                <input type="text" placeholder="Write Task here" id="Task">
                <button type="button" id="add">Add</button>
            </div>
            <div class="error">
                <p id="error">Write task before clicking the Button</p>
            </div>
        </div>
        <!-- <div>
                <p id="error">Write task before clicking the Button</p>
            </div> -->

        <div class="alltaskcontainer">
            <ol id="alltask"></ol>
        </div>
    </div>


    <script src="script.js"></script>
</body>

</html>
